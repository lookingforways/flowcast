<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Flowcast</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #0f0f1e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 380px; }
    .brand { font-size: 2rem; font-weight: 700; color: #fff; letter-spacing: 1px; }
    .brand span { color: #00FF88; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand"><i class="bi bi-waveform"></i> Flow<span>cast</span></div>
      <p class="text-secondary mt-1">Ingresá para continuar</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 text-center">{{ error }}</div>
    {% endif %}

    <div class="card bg-dark border-secondary">
      <div class="card-body p-4">
        <form method="post" action="/login">
          <div class="mb-3">
            <label class="form-label text-light">Usuario</label>
            <div class="input-group">
              <span class="input-group-text bg-dark border-secondary text-secondary">
                <i class="bi bi-person"></i>
              </span>
              <input type="text" name="username" class="form-control bg-dark border-secondary text-light"
                     placeholder="admin" required autofocus autocomplete="username">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label text-light">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text bg-dark border-secondary text-secondary">
                <i class="bi bi-lock"></i>
              </span>
              <input type="password" name="password" class="form-control bg-dark border-secondary text-light"
                     placeholder="••••••••" required autocomplete="current-password">
            </div>
          </div>
          <button type="submit" class="btn btn-success w-100 fw-semibold">
            <i class="bi bi-arrow-right-circle me-1"></i>Continuar
          </button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Iniciar sesión — FlowCast</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/static/css/phosphor.css?v=0.9.24">
  <link rel="stylesheet" href="/static/css/theme.css?v=0.9.24">
  {# Apply saved/system theme before first paint — prevents flash of wrong theme #}
  <script nonce="{{ request.state.csp_nonce }}">
    (function () {
      var saved = localStorage.getItem('fc-theme');
      var sys   = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', saved || sys);
    }());
  </script>
  <style nonce="{{ request.state.csp_nonce }}">
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .fc-auth-box {
      width: 100%;
      max-width: 380px;
    }

    .fc-auth-brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .fc-auth-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 12px;
    }

    .fc-auth-name {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--fc-text);
      margin-bottom: 4px;
    }

    .fc-auth-sub {
      font-size: 0.875rem;
      color: var(--fc-text-muted);
    }

    .fc-card-body { padding: 24px; }

    .fc-field      { margin-bottom: 16px; }
    .fc-field-last { margin-bottom: 24px; }

    .fc-error {
      text-align: center;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<div class="fc-auth-box">

  <div class="fc-auth-brand">
    <img src="/static/img/flowcast-logo-claro.svg" class="fc-auth-logo logo-light" alt="" aria-hidden="true">
    <img src="/static/img/flowcast-logo-oscuro.svg" class="fc-auth-logo logo-dark"  alt="" aria-hidden="true">
    <p class="fc-auth-name">FlowCast</p>
    <p class="fc-auth-sub">Ingresá para continuar</p>
  </div>

  {% if error %}
  <div class="alert alert-danger fc-error" role="alert" aria-live="assertive">
    {{ error }}
  </div>
  {% endif %}

  <noscript>
    <div class="alert alert-info fc-error">
      Esta página funciona correctamente sin JavaScript.
    </div>
  </noscript>

  <div class="card">
    <div class="fc-card-body">
      <form method="post" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="fc-field">
          <label for="username" class="form-label">
            <i class="ph ph-user" aria-hidden="true"></i> Usuario
          </label>
          <input id="username" type="text" name="username" class="form-control"
                 placeholder="Usuario" maxlength="150"
                 required autofocus autocomplete="username">
        </div>

        <div class="fc-field-last">
          <label for="password" class="form-label">
            <i class="ph ph-lock" aria-hidden="true"></i> Contraseña
          </label>
          <input id="password" type="password" name="password" class="form-control"
                 placeholder="••••••••" minlength="8" maxlength="256"
                 required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary w-100">
          <i class="ph ph-arrow-circle-right" aria-hidden="true"></i>
          Continuar
        </button>
      </form>
    </div>
  </div>

</div>

<script nonce="{{ request.state.csp_nonce }}">
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
  if (!localStorage.getItem('fc-theme')) {
    document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
  }
});
</script>
</body>
</html>
